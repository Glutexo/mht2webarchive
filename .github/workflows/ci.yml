name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Run integration tests
        run: swift run mht2webarchiveIntegrationTests
